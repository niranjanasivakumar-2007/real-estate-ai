<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestIQ — Search Results</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8f9fa; color: #1a1a2e; }

        nav {
            background: #1a1a2e;
            padding: 16px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-size: 22px; font-weight: 700; color: #fff; }
        .logo span { color: #4f8ef7; }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-link {
            color: #aaa;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-link:hover { color: #fff; }

        /* FILTER SIDEBAR + RESULTS LAYOUT */
        .page-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 0;
            min-height: calc(100vh - 60px);
        }

        /* SIDEBAR */
        .sidebar {
            background: #fff;
            border-right: 1px solid #eee;
            padding: 28px 24px;
            position: sticky;
            top: 60px;
            height: calc(100vh - 60px);
            overflow-y: auto;
        }

        .sidebar h2 {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #eee;
        }

        .filter-group {
            margin-bottom: 24px;
        }

        .filter-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .filter-group input,
        .filter-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #e8ecf0;
            border-radius: 10px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            outline: none;
            color: #1a1a2e;
            transition: border 0.2s;
            background: #fff;
        }

        .filter-group input:focus,
        .filter-group select:focus { border-color: #4f8ef7; }

        .budget-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        /* ROOM TYPE CHECKBOXES */
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 13px;
            color: #444;
        }

        .checkbox-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #4f8ef7;
            cursor: pointer;
        }

        /* STYLE PILLS */
        .style-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .style-pill {
            padding: 6px 14px;
            border: 1.5px solid #e8ecf0;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            color: #555;
            transition: all 0.2s;
            background: #fff;
            font-family: 'Inter', sans-serif;
        }

        .style-pill.active {
            background: #1a1a2e;
            color: #fff;
            border-color: #1a1a2e;
        }

        .style-pill:hover:not(.active) {
            border-color: #4f8ef7;
            color: #4f8ef7;
        }

        .btn-apply {
            width: 100%;
            padding: 12px;
            background: #4f8ef7;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-apply:hover { background: #3a7be0; }

        .btn-clear {
            width: 100%;
            padding: 10px;
            background: #f1f3f5;
            color: #555;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            margin-top: 8px;
            transition: all 0.2s;
        }

        .btn-clear:hover { background: #e8ecf0; }

        /* RESULTS AREA */
        .results-area {
            padding: 28px 32px;
        }

        .results-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .results-topbar h2 {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .results-meta {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .results-count {
            font-size: 13px;
            color: #888;
        }

        .sort-select {
            padding: 8px 12px;
            border: 1.5px solid #e8ecf0;
            border-radius: 8px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            outline: none;
            color: #1a1a2e;
            background: #fff;
            cursor: pointer;
        }

        /* PROPERTY CARDS */
        .properties-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .property-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #eee;
            transition: all 0.25s;
            cursor: pointer;
        }

        .property-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.1);
        }

        .card-image {
            position: relative;
            height: 180px;
            background: #e8ecf0;
            overflow: hidden;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .property-card:hover .card-image img { transform: scale(1.05); }

        .card-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #4f8ef7;
            color: #fff;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .style-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }

        .card-body { padding: 16px 18px; }

        .card-price {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .card-location {
            font-size: 12px;
            color: #888;
            margin-bottom: 12px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid #f1f3f5;
        }

        .card-stats {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: #aaa;
        }

        .btn-view {
            background: #f1f3f5;
            color: #1a1a2e;
            border: none;
            padding: 7px 14px;
            border-radius: 7px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .btn-view:hover { background: #4f8ef7; color: #fff; }

        /* EMPTY STATE */
        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 80px 20px;
            color: #aaa;
        }

        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 18px; color: #555; margin-bottom: 8px; }
        .empty-state p { font-size: 14px; }

        .loading {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px;
            color: #888;
        }

        /* ACTIVE FILTERS */
        .active-filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filter-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #e8f0fe;
            color: #4f8ef7;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .filter-chip button {
            background: none;
            border: none;
            color: #4f8ef7;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            padding: 0;
        }

        @media (max-width: 900px) {
            .page-layout { grid-template-columns: 1fr; }
            .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid #eee; }
            nav { padding: 16px 24px; }
            .results-area { padding: 20px 16px; }
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">Nest<span>IQ</span></div>
    <div class="nav-right">
        <a class="nav-link" href="/buyer/dashboard">← Back to Home</a>
        <a class="nav-link" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="page-layout">

    <!-- SIDEBAR FILTERS -->
    <aside class="sidebar">
        <h2>🔍 Filter Properties</h2>

        <div class="filter-group">
            <label>Location</label>
            <input type="text" id="filterLocation" placeholder="City or area">
        </div>

        <div class="filter-group">
            <label>Budget Range (₹)</label>
            <div class="budget-row">
                <input type="number" id="filterMin" placeholder="Min">
                <input type="number" id="filterMax" placeholder="Max">
            </div>
        </div>

        <div class="filter-group">
            <label>Room Type</label>
            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" value="bedroom"> Bedroom
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" value="kitchen"> Kitchen
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" value="living room"> Living Room
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" value="bathroom"> Bathroom
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" value="balcony"> Balcony
                </label>
            </div>
        </div>

        <div class="filter-group">
            <label>Design Style</label>
            <div class="style-pills">
                <button class="style-pill" onclick="toggleStyle(this, 'modern')">Modern</button>
                <button class="style-pill" onclick="toggleStyle(this, 'minimalist')">Minimalist</button>
                <button class="style-pill" onclick="toggleStyle(this, 'farmhouse')">Farmhouse</button>
                <button class="style-pill" onclick="toggleStyle(this, 'traditional')">Traditional</button>
                <button class="style-pill" onclick="toggleStyle(this, 'luxury')">Luxury</button>
                <button class="style-pill" onclick="toggleStyle(this, 'industrial')">Industrial</button>
            </div>
        </div>

        <div class="filter-group">
            <label>Land Size</label>
            <input type="text" id="filterLandSize" placeholder="e.g. 1200 sq ft">
        </div>

        <button class="btn-apply" onclick="applyFilters()">Apply Filters</button>
        <button class="btn-clear" onclick="clearFilters()">Clear All</button>
    </aside>

    <!-- RESULTS -->
    <main class="results-area">
        <div class="results-topbar">
            <h2>Search Results</h2>
            <div class="results-meta">
                <span class="results-count" id="resultsCount">Loading...</span>
                <select class="sort-select" id="sortSelect" onchange="sortResults()">
                    <option value="default">Sort by: Default</option>
                    <option value="price_asc">Price: Low to High</option>
                    <option value="price_desc">Price: High to Low</option>
                    <option value="views">Most Viewed</option>
                    <option value="likes">Most Liked</option>
                </select>
            </div>
        </div>

        <div class="active-filters" id="activeFilters"></div>

        <div class="properties-grid" id="propertiesGrid">
            <div class="loading">Loading properties...</div>
        </div>
    </main>
</div>

<script>
    let allProperties = [];
    let selectedStyle = null;

    window.onload = async () => {
        // Read URL params if coming from dashboard search
        const params = new URLSearchParams(window.location.search);
        if (params.get('location')) document.getElementById('filterLocation').value = params.get('location');
        if (params.get('budget_min')) document.getElementById('filterMin').value = params.get('budget_min');
        if (params.get('budget_max')) document.getElementById('filterMax').value = params.get('budget_max');
        if (params.get('style')) {
            selectedStyle = params.get('style');
            document.querySelectorAll('.style-pill').forEach(p => {
                if (p.textContent.toLowerCase() === selectedStyle) p.classList.add('active');
            });
        }
        await loadProperties();
    }

    async function loadProperties() {
        const location = document.getElementById('filterLocation').value;
        const budgetMin = document.getElementById('filterMin').value;
        const budgetMax = document.getElementById('filterMax').value;
        const style = selectedStyle || '';

        let url = `/buyer/search?`;
        if (location) url += `location=${location}&`;
        if (budgetMin) url += `budget_min=${budgetMin}&`;
        if (budgetMax) url += `budget_max=${budgetMax}&`;
        if (style) url += `style=${style}&`;

        const res = await fetch(url);
        const data = await res.json();
        allProperties = data.results || [];
        renderCards(allProperties);
        updateActiveFilters();
    }

    function applyFilters() { loadProperties(); }

    function clearFilters() {
        document.getElementById('filterLocation').value = '';
        document.getElementById('filterMin').value = '';
        document.getElementById('filterMax').value = '';
        document.getElementById('filterLandSize').value = '';
        document.querySelectorAll('.checkbox-item input').forEach(c => c.checked = false);
        document.querySelectorAll('.style-pill').forEach(p => p.classList.remove('active'));
        selectedStyle = null;
        loadProperties();
    }

    function toggleStyle(el, style) {
        document.querySelectorAll('.style-pill').forEach(p => p.classList.remove('active'));
        if (selectedStyle === style) {
            selectedStyle = null;
        } else {
            selectedStyle = style;
            el.classList.add('active');
        }
    }

    function sortResults() {
        const sort = document.getElementById('sortSelect').value;
        let sorted = [...allProperties];
        if (sort === 'price_asc') sorted.sort((a, b) => a.price - b.price);
        else if (sort === 'price_desc') sorted.sort((a, b) => b.price - a.price);
        else if (sort === 'views') sorted.sort((a, b) => (b.views || 0) - (a.views || 0));
        else if (sort === 'likes') sorted.sort((a, b) => (b.likes || 0) - (a.likes || 0));
        renderCards(sorted);
    }

    function updateActiveFilters() {
        const chips = document.getElementById('activeFilters');
        const location = document.getElementById('filterLocation').value;
        const min = document.getElementById('filterMin').value;
        const max = document.getElementById('filterMax').value;
        let html = '';
        if (location) html += chip(`📍 ${location}`, 'location');
        if (min || max) html += chip(`💰 ₹${min||'0'} - ₹${max||'∞'}`, 'budget');
        if (selectedStyle) html += chip(`🎨 ${selectedStyle}`, 'style');
        chips.innerHTML = html;
    }

    function chip(label, type) {
        return `<div class="filter-chip">${label}
            <button onclick="removeFilter('${type}')">×</button></div>`;
    }

    function removeFilter(type) {
        if (type === 'location') document.getElementById('filterLocation').value = '';
        if (type === 'budget') {
            document.getElementById('filterMin').value = '';
            document.getElementById('filterMax').value = '';
        }
        if (type === 'style') {
            selectedStyle = null;
            document.querySelectorAll('.style-pill').forEach(p => p.classList.remove('active'));
        }
        loadProperties();
    }

    function renderCards(properties) {
        const grid = document.getElementById('propertiesGrid');
        document.getElementById('resultsCount').textContent =
            `${properties.length} propert${properties.length === 1 ? 'y' : 'ies'} found`;

        if (!properties.length) {
            grid.innerHTML = `
                <div class="empty-state">
                    <div class="icon">🔍</div>
                    <h3>No properties match your filters</h3>
                    <p>Try adjusting or clearing your filters</p>
                </div>`;
            return;
        }

        grid.innerHTML = properties.map(p => `
            <div class="property-card" onclick="window.location.href='/listing/${p._id}'">
                <div class="card-image">
                    ${p.images && p.images[0]
                        ? `<img src="${p.images[0]}" alt="${p.title}">`
                        : `<div style="width:100%;height:100%;display:flex;align-items:center;
                           justify-content:center;font-size:36px;color:#ccc">🏠</div>`}
                    <div class="card-badge">For Sale</div>
                </div>
                <div class="card-body">
                    <div class="card-price">₹${Number(p.price).toLocaleString('en-IN')}</div>
                    <div class="card-title">${p.title}</div>
                    <div class="card-location">📍 ${p.location}</div>
                    <div class="card-footer">
                        <div class="card-stats">
                            <span>👁 ${p.views || 0}</span>
                            <span>♡ ${p.likes || 0}</span>
                        </div>
                        <button class="btn-view">View</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function logout() {
        await fetch('/logout', { method: 'POST' });
        window.location.href = '/';
    }
</script>

</body>
</html>

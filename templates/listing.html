<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestIQ — Property Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8f9fa; color: #1a1a2e; }

        nav {
            background: #1a1a2e;
            padding: 16px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-size: 22px; font-weight: 700; color: #fff; }
        .logo span { color: #4f8ef7; }

        .nav-back {
            color: #aaa;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .nav-back:hover { color: #fff; }

        /* HERO IMAGE VIEWER */
        .image-viewer {
            background: #1a1a2e;
            padding: 30px 60px;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
            align-items: start;
        }

        .main-image-wrap {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: #0f1929;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #mainImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
            cursor: grab;
        }

        #mainImage:active { cursor: grabbing; }

        /* IMAGE CONTROLS */
        .image-controls {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }

        .ctrl-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .ctrl-btn:hover { background: rgba(255,255,255,0.3); }

        .zoom-level {
            color: #fff;
            font-size: 12px;
            display: flex;
            align-items: center;
            padding: 0 8px;
        }

        /* THUMBNAIL STRIP */
        .thumbnail-strip {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .thumbnail-strip::-webkit-scrollbar { width: 4px; }
        .thumbnail-strip::-webkit-scrollbar-track { background: transparent; }
        .thumbnail-strip::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

        .thumb {
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            aspect-ratio: 16/9;
            flex-shrink: 0;
        }

        .thumb.active { border-color: #4f8ef7; }
        .thumb:hover { border-color: #4f8ef7; opacity: 0.9; }

        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* PROPERTY INFO */
        .property-info {
            padding: 40px 60px;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 40px;
            align-items: start;
        }

        .info-main h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .info-location {
            color: #888;
            font-size: 15px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-price {
            font-size: 32px;
            font-weight: 700;
            color: #4f8ef7;
            margin-bottom: 20px;
        }

        .info-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .info-tag {
            background: #f1f3f5;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: #444;
        }

        .info-description {
            color: #555;
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 28px;
        }

        /* ROOM TABS */
        .room-tabs {
            margin-bottom: 20px;
        }

        .room-tabs h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 14px;
            color: #1a1a2e;
        }

        .tabs-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .room-tab {
            padding: 8px 18px;
            border: 1.5px solid #e8ecf0;
            border-radius: 20px;
            background: #fff;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: #555;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .room-tab.active {
            background: #1a1a2e;
            color: #fff;
            border-color: #1a1a2e;
        }

        .room-tab:hover:not(.active) {
            border-color: #4f8ef7;
            color: #4f8ef7;
        }

        /* VISUALIZER PANEL */
        .visualizer-panel {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #eee;
            position: sticky;
            top: 80px;
        }

        .visualizer-panel h3 {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .visualizer-panel > p {
            font-size: 13px;
            color: #888;
            margin-bottom: 20px;
        }

        .viz-section {
            margin-bottom: 20px;
        }

        .viz-section label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        /* COLOR SWATCHES */
        .color-swatches {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
        }

        .swatch {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .swatch:hover, .swatch.active {
            border-color: #4f8ef7;
            transform: scale(1.1);
        }

        /* MOOD BUTTONS */
        .mood-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .mood-btn {
            padding: 10px;
            border: 1.5px solid #e8ecf0;
            border-radius: 8px;
            background: #fff;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            color: #555;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .mood-btn:hover, .mood-btn.active {
            border-color: #4f8ef7;
            color: #4f8ef7;
            background: rgba(79,142,247,0.05);
        }

        .btn-visualize {
            width: 100%;
            padding: 13px;
            background: #4f8ef7;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            margin-top: 4px;
        }

        .btn-visualize:hover {
            background: #3a7be0;
            transform: translateY(-1px);
        }

        .btn-reset {
            width: 100%;
            padding: 10px;
            background: #f1f3f5;
            color: #555;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            margin-top: 8px;
            transition: all 0.2s;
        }

        .btn-reset:hover { background: #e8ecf0; }

        /* ACTION PANEL */
        .action-panel {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #eee;
            margin-top: 20px;
        }

        .action-panel h3 {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .action-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-like {
            padding: 13px;
            background: #fff0f5;
            color: #e05;
            border: 1.5px solid #ffd0df;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .btn-like:hover { background: #ffe0ec; }

        .comment-box {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e8ecf0;
            border-radius: 10px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            resize: none;
            outline: none;
            color: #1a1a2e;
            transition: border 0.2s;
        }

        .comment-box:focus { border-color: #4f8ef7; }

        .btn-comment {
            padding: 11px;
            background: #1a1a2e;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .btn-comment:hover { background: #2d2d4e; }

        /* COMMENTS LIST */
        .comments-section {
            padding: 0 60px 40px;
        }

        .comments-section h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .comment-item {
            background: #fff;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            border: 1px solid #eee;
        }

        .comment-author {
            font-size: 13px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .comment-text {
            font-size: 14px;
            color: #555;
            line-height: 1.5;
        }

        /* LOADING OVERLAY */
        .viz-loading {
            display: none;
            text-align: center;
            padding: 12px;
            font-size: 13px;
            color: #888;
        }

        @media (max-width: 1024px) {
            .image-viewer { grid-template-columns: 1fr; padding: 20px 24px; }
            .thumbnail-strip { flex-direction: row; max-height: none; overflow-x: auto; }
            .thumb { width: 120px; flex-shrink: 0; }
            .property-info { grid-template-columns: 1fr; padding: 24px; }
            .comments-section { padding: 0 24px 40px; }
            nav { padding: 16px 24px; }
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">Nest<span>IQ</span></div>
    <div class="nav-back" onclick="window.history.back()">← Back to listings</div>
</nav>

<!-- IMAGE VIEWER -->
<section class="image-viewer">
    <div class="main-image-wrap">
        <img id="mainImage" src="" alt="Property Image">
        <div class="image-controls">
            <button class="ctrl-btn" onclick="rotateImage(-90)" title="Rotate Left">↺</button>
            <button class="ctrl-btn" onclick="zoomOut()" title="Zoom Out">−</button>
            <span class="zoom-level" id="zoomLevel">100%</span>
            <button class="ctrl-btn" onclick="zoomIn()" title="Zoom In">+</button>
            <button class="ctrl-btn" onclick="rotateImage(90)" title="Rotate Right">↻</button>
            <button class="ctrl-btn" onclick="resetView()" title="Reset">⊙</button>
        </div>
    </div>

    <div class="thumbnail-strip" id="thumbnailStrip"></div>
</section>

<!-- PROPERTY INFO -->
<section class="property-info">
    <div class="info-main">
        <h1 id="propTitle">Loading...</h1>
        <div class="info-location">📍 <span id="propLocation"></span></div>
        <div class="info-price" id="propPrice"></div>
        <div class="info-tags" id="propTags"></div>
        <p class="info-description" id="propDescription"></p>

        <!-- ROOM TABS -->
        <div class="room-tabs">
            <h2>Browse by Room</h2>
            <div class="tabs-row" id="roomTabs"></div>
        </div>
    </div>

    <div>
        <!-- VISUALIZER -->
        <div class="visualizer-panel">
            <h3>✨ Design Visualizer</h3>
            <p>See this room in your preferred style</p>

            <div class="viz-section">
                <label>Wall Color</label>
                <div class="color-swatches">
                    <div class="swatch" style="background:#ffb6c1" onclick="selectColor('pink', this)" title="Pink"></div>
                    <div class="swatch" style="background:#87ceeb" onclick="selectColor('blue', this)" title="Blue"></div>
                    <div class="swatch" style="background:#f5f5f5" onclick="selectColor('white', this)" title="White"></div>
                    <div class="swatch" style="background:#90ee90" onclick="selectColor('green', this)" title="Green"></div>
                    <div class="swatch" style="background:#ffffa0" onclick="selectColor('yellow', this)" title="Yellow"></div>
                    <div class="swatch" style="background:#c8c8c8" onclick="selectColor('gray', this)" title="Gray"></div>
                    <div class="swatch" style="background:#f5f5dc" onclick="selectColor('beige', this)" title="Beige"></div>
                    <div class="swatch" style="background:#b5651d" onclick="selectColor('brown', this)" title="Brown"></div>
                    <div class="swatch" style="background:#ff6347" onclick="selectColor('red', this)" title="Red"></div>
                    <div class="swatch" style="background:#d8bfd8" onclick="selectColor('purple', this)" title="Purple"></div>
                    <div class="swatch" style="background:#ffc87c" onclick="selectColor('orange', this)" title="Orange"></div>
                    <div class="swatch" style="background:#282828" onclick="selectColor('black', this)" title="Black"></div>
                </div>
            </div>

            <div class="viz-section">
                <label>Lighting Mood</label>
                <div class="mood-btns">
                    <button class="mood-btn" onclick="selectMood('warm', this)">☀️ Warm</button>
                    <button class="mood-btn" onclick="selectMood('cool', this)">❄️ Cool</button>
                    <button class="mood-btn" onclick="selectMood('bright', this)">💡 Bright</button>
                    <button class="mood-btn" onclick="selectMood('dim', this)">🌙 Dim</button>
                </div>
            </div>

            <div class="viz-section">
                <label>Style Filter</label>
                <div class="mood-btns">
                    <button class="mood-btn" onclick="selectStyle('minimalist', this)">◻ Minimalist</button>
                    <button class="mood-btn" onclick="selectStyle('warm', this)">🏡 Warm</button>
                    <button class="mood-btn" onclick="selectStyle('vintage', this)">📷 Vintage</button>
                    <button class="mood-btn" onclick="selectStyle('bright', this)">✦ Bright</button>
                </div>
            </div>

            <div class="viz-loading" id="vizLoading">⏳ Applying visualization...</div>
            <button class="btn-visualize" onclick="applyVisualization()">Apply Visualization</button>
            <button class="btn-reset" onclick="resetVisualization()">Reset to Original</button>
        </div>

        <!-- ACTIONS -->
        <div class="action-panel">
            <h3>Interested in this property?</h3>
            <div class="action-btns">
                <button class="btn-like" onclick="likeProperty()">♡ Like this Property</button>
                <textarea class="comment-box" id="commentText"
                    placeholder="Share your thoughts about this property..." rows="3"></textarea>
                <button class="btn-comment" onclick="postComment()">Post Comment</button>
            </div>
        </div>
    </div>
</section>

<!-- COMMENTS -->
<section class="comments-section">
    <h2>Buyer Comments</h2>
    <div id="commentsList"></div>
</section>

<script>
    // State
    let currentZoom = 1;
    let currentRotation = 0;
    let selectedColor = null;
    let selectedMood = null;
    let selectedStyleFilter = null;
    let allImages = [];
    let currentImageUrl = '';
    let originalImageUrl = '';
    const propertyId = window.location.pathname.split('/').pop();

    // Load property on page open
    window.onload = async () => {
        const res = await fetch(`/properties/${propertyId}`);
        const data = await res.json();
        if (!data.property) return;

        const p = data.property;
        document.title = `NestIQ — ${p.title}`;
        document.getElementById('propTitle').textContent = p.title;
        document.getElementById('propLocation').textContent = p.location;
        document.getElementById('propPrice').textContent =
            `₹${Number(p.price).toLocaleString('en-IN')}`;
        document.getElementById('propDescription').textContent =
            p.description || 'No description provided.';

        // Tags
        const tagsEl = document.getElementById('propTags');
        if (p.land_size) tagsEl.innerHTML += `<span class="info-tag">📐 ${p.land_size}</span>`;
        tagsEl.innerHTML += `<span class="info-tag">👁 ${p.views || 0} views</span>`;
        tagsEl.innerHTML += `<span class="info-tag">♡ ${p.likes || 0} likes</span>`;

        // Room tabs + images
        const rooms = data.rooms;
        buildRoomTabs(rooms);
        buildThumbnails(rooms);

        // Comments
        renderComments(p.comments || []);

        // Record view
        fetch(`/properties/${propertyId}`, { method: 'GET' });
    }

    function buildRoomTabs(rooms) {
        const tabsRow = document.getElementById('roomTabs');
        const roomNames = Object.keys(rooms);
        if (!roomNames.length) return;

        tabsRow.innerHTML = roomNames.map((room, i) => `
            <button class="room-tab ${i === 0 ? 'active' : ''}"
                onclick="switchRoom('${room}', this)">
                ${room.charAt(0).toUpperCase() + room.slice(1)}
                (${rooms[room].length})
            </button>
        `).join('');

        // Load first room images
        loadRoomImages(rooms[roomNames[0]]);
    }

    function buildThumbnails(rooms) {
        allImages = Object.values(rooms).flat();
        if (!allImages.length) return;

        const strip = document.getElementById('thumbnailStrip');
        strip.innerHTML = allImages.map((img, i) => `
            <div class="thumb ${i === 0 ? 'active' : ''}"
                onclick="selectImage('${img.url}', this)">
                <img src="${img.url}" alt="Room view ${i+1}">
            </div>
        `).join('');

        // Set first image
        setMainImage(allImages[0].url);
    }

    function loadRoomImages(images) {
        if (!images || !images.length) return;
        const strip = document.getElementById('thumbnailStrip');
        strip.innerHTML = images.map((img, i) => `
            <div class="thumb ${i === 0 ? 'active' : ''}"
                onclick="selectImage('${img.url}', this)">
                <img src="${img.url}" alt="Room view">
            </div>
        `).join('');
        setMainImage(images[0].url);
    }

    function switchRoom(roomName, btn) {
        document.querySelectorAll('.room-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        fetch(`/properties/${propertyId}`)
            .then(r => r.json())
            .then(data => {
                const roomImages = data.rooms[roomName] || [];
                loadRoomImages(roomImages);
            });
    }

    function setMainImage(url) {
        currentImageUrl = url;
        originalImageUrl = url;
        document.getElementById('mainImage').src = url;
        resetView();
    }

    function selectImage(url, thumbEl) {
        document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
        thumbEl.classList.add('active');
        setMainImage(url);
        selectedColor = null;
        selectedMood = null;
        selectedStyleFilter = null;
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    }

    // ZOOM & ROTATE
    function applyTransform() {
        const img = document.getElementById('mainImage');
        img.style.transform = `scale(${currentZoom}) rotate(${currentRotation}deg)`;
        document.getElementById('zoomLevel').textContent = `${Math.round(currentZoom * 100)}%`;
    }

    function zoomIn() {
        if (currentZoom < 3) { currentZoom += 0.25; applyTransform(); }
    }

    function zoomOut() {
        if (currentZoom > 0.5) { currentZoom -= 0.25; applyTransform(); }
    }

    function rotateImage(deg) {
        currentRotation += deg;
        applyTransform();
    }

    function resetView() {
        currentZoom = 1;
        currentRotation = 0;
        applyTransform();
    }

    // VISUALIZER
    function selectColor(color, el) {
        selectedColor = color;
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        el.classList.add('active');
    }

    function selectMood(mood, el) {
        selectedMood = mood;
        document.querySelectorAll('.mood-btn').forEach(b => {
            if (['warm','cool','bright','dim'].includes(b.textContent.trim().split(' ')[1]?.toLowerCase() ||
                b.textContent.trim().toLowerCase()))
                b.classList.remove('active');
        });
        el.classList.add('active');
    }

    function selectStyle(style, el) {
        selectedStyleFilter = style;
        document.querySelectorAll('.mood-btn').forEach(b => {
            if (['minimalist','warm','vintage','bright'].includes(
                b.getAttribute('onclick')?.match(/'([^']+)'/)?.[1]))
                b.classList.remove('active');
        });
        el.classList.add('active');
    }

    async function applyVisualization() {
        if (!selectedColor && !selectedMood && !selectedStyleFilter) {
            alert('Please select a color, mood or style first!');
            return;
        }

        document.getElementById('vizLoading').style.display = 'block';

        const params = new URLSearchParams();
        params.append('image_url', currentImageUrl);
        if (selectedColor) params.append('color', selectedColor);
        if (selectedMood) params.append('lighting', selectedMood);
        if (selectedStyleFilter) params.append('style', selectedStyleFilter);

        const res = await fetch(`/buyer/visualize?${params.toString()}`);
        document.getElementById('vizLoading').style.display = 'none';

        if (res.ok) {
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            document.getElementById('mainImage').src = url;
            currentImageUrl = url;
        } else {
            alert('Visualization failed. Please try again.');
        }
    }

    function resetVisualization() {
        document.getElementById('mainImage').src = originalImageUrl;
        currentImageUrl = originalImageUrl;
        selectedColor = null;
        selectedMood = null;
        selectedStyleFilter = null;
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
        resetView();
    }

    // LIKE & COMMENT
    async function likeProperty() {
        await fetch(`/buyer/property/${propertyId}/like`, { method: 'POST' });
        alert('Property liked! ♡');
    }

    async function postComment() {
        const text = document.getElementById('commentText').value.trim();
        if (!text) return;
        const res = await fetch(`/buyer/property/${propertyId}/comment`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text })
        });
        if (res.ok) {
            document.getElementById('commentText').value = '';
            const data = await fetch(`/properties/${propertyId}`).then(r => r.json());
            renderComments(data.property.comments || []);
        }
    }

    function renderComments(comments) {
        const el = document.getElementById('commentsList');
        if (!comments.length) {
            el.innerHTML = '<p style="color:#aaa;font-size:14px">No comments yet. Be the first!</p>';
            return;
        }
        el.innerHTML = comments.map(c => `
            <div class="comment-item">
                <div class="comment-author">👤 ${c.user}</div>
                <div class="comment-text">${c.text}</div>
            </div>
        `).join('');
    }
</script>

</body>
</html>

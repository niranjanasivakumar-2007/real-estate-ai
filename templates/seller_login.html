<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestIQ — Seller Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrap {
            width: 420px;
            padding: 20px;
        }

        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .logo span { color: #4f8ef7; }

        .subtitle {
            text-align: center;
            color: #aab4c8;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .card h2 {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .card p {
            font-size: 13px;
            color: #888;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e8ecf0;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            color: #1a1a2e;
            transition: border 0.2s;
        }

        .form-group input:focus { border-color: #4f8ef7; }

        .partnership-note {
            background: #f0f7ff;
            border: 1px solid #d0e4ff;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: #2b6cb0;
            margin-bottom: 16px;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #4f8ef7;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            margin-top: 4px;
        }

        .btn-login:hover {
            background: #3a7be0;
            transform: translateY(-1px);
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #aab4c8;
        }

        .back-link a {
            color: #4f8ef7;
            text-decoration: none;
            font-weight: 500;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .alert.error {
            background: #fff0f0;
            color: #e53e3e;
            border: 1px solid #fed7d7;
        }

        .alert.success {
            background: #f0fff4;
            color: #276749;
            border: 1px solid #c6f6d5;
        }
    </style>
</head>
<body>

<div class="login-wrap">
    <div class="logo">Nest<span>IQ</span></div>
    <div class="subtitle">Seller Partner Portal</div>

    <div class="card">
        <h2>Seller Login</h2>
        <p>Enter your credentials and partnership code to access your dashboard</p>

        <div id="alert" class="alert"></div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="your@email.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <div class="form-group">
            <label>Partnership Code</label>
            <input type="text" id="partnerCode" placeholder="e.g. NESTIQ2026">
        </div>

        <div class="partnership-note">
            🔑 Partnership code is provided by NestIQ when you become a verified partner.
        </div>

        <button class="btn-login" onclick="handleSellerLogin()">
            Login to Dashboard
        </button>
    </div>

    <div class="back-link">
        <a href="/">← Back to main site</a>
    </div>
</div>

<script>
    function showAlert(msg, type) {
        const el = document.getElementById('alert');
        el.textContent = msg;
        el.className = `alert ${type}`;
        el.style.display = 'block';
    }

    async function handleSellerLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const partnerCode = document.getElementById('partnerCode').value.trim();

        if (!email || !password || !partnerCode) {
            showAlert('Please fill in all fields', 'error');
            return;
        }

        showAlert('Logging in...', 'success');

        const res = await fetch('/seller/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email,
                password,
                partnership_code: partnerCode
            })
        });

        const data = await res.json();
        if (res.ok) {
            showAlert(`Welcome, ${data.name}!`, 'success');
            setTimeout(() => window.location.href = '/seller/home', 1000);
        } else {
            showAlert(data.error || 'Login failed', 'error');
        }
    }
</script>

</body>
</html>
